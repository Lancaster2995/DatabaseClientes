<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gestor de Clientes — Drive</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;
    --gray-bg:#F7F7F9;--gray-border:#E2E2E6;--gray-text:#6B6B7B;
    --text:#1A1A2E;--white:#fff;--danger:#A32D2D;--danger-bg:#FCEBEB;
    --success:#3B6D11;--success-bg:#EAF3DE;
    --radius:10px;--radius-sm:6px;
    --font:'Inter',system-ui,sans-serif;
    --header-h:52px;
  }
  html,body{width:100%;max-width:100%;overflow-x:hidden;}
  body{font-family:var(--font);background:var(--gray-bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}

  /* AUTH SCREEN */
  #authScreen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
  .auth-card{background:var(--white);border-radius:16px;border:1px solid var(--gray-border);padding:40px 48px;text-align:center;max-width:380px;width:90%;}
  .auth-card h1{font-size:22px;font-weight:600;margin-bottom:6px;}
  .auth-card p{font-size:14px;color:var(--gray-text);margin-bottom:24px;line-height:1.5;}
  .auth-btn{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;}
  .auth-btn:hover{background:#3C3489;}
  .auth-btn svg{width:18px;height:18px;}

  /* APP */
  #appScreen{flex:1;display:none;flex-direction:column;overflow:hidden;}

  /* HEADER */
  .header{background:var(--white);border-bottom:1px solid var(--gray-border);padding:0 20px;height:var(--header-h);display:flex;align-items:center;gap:14px;}
  .menu-toggle{display:none;width:30px;height:30px;border:none;background:none;cursor:pointer;color:var(--text);align-items:center;justify-content:center;flex-shrink:0;border-radius:6px;}
  .menu-toggle:hover{background:var(--gray-bg);}
  .header-logo{font-size:15px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:7px;white-space:nowrap;}
  .header-logo svg{width:18px;height:18px;flex-shrink:0;}
  .header-spacer{flex:1;}
  .user-info{font-size:12px;color:var(--gray-text);display:flex;align-items:center;gap:8px;}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--purple);flex-shrink:0;}
  .logout-btn{font-size:12px;color:var(--gray-text);background:none;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;white-space:nowrap;}
  .logout-btn:hover{border-color:var(--purple);color:var(--purple);}

  /* NOTIF BELL */
  .notif-btn{position:relative;flex-shrink:0;}
  .notif-badge{position:absolute;top:-3px;right:-3px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1;}
  .notif-panel{position:absolute;top:calc(var(--header-h) + 6px);right:16px;width:330px;max-width:92vw;max-height:430px;overflow-y:auto;background:#fff;border:1px solid var(--gray-border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:250;}
  .notif-panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-border);gap:8px;flex-wrap:wrap;}
  .notif-panel-head h4{font-size:13px;font-weight:600;}
  .notif-panel-actions{display:flex;gap:10px;}
  .notif-link{font-size:11px;color:var(--purple);background:none;border:none;cursor:pointer;font-weight:500;}
  .notif-link:hover{text-decoration:underline;}
  .notif-item{padding:10px 14px;border-bottom:1px solid var(--gray-border);font-size:12px;cursor:pointer;display:flex;gap:8px;}
  .notif-item:last-child{border-bottom:none;}
  .notif-item:hover{background:var(--gray-bg);}
  .notif-item.unread{background:var(--purple-light);}
  .notif-dot2{width:7px;height:7px;border-radius:50%;background:var(--purple);margin-top:5px;flex-shrink:0;}
  .notif-item.read .notif-dot2{background:var(--gray-border);}
  .notif-txt b{font-weight:600;}
  .notif-meta{font-size:10px;color:var(--gray-text);margin-top:2px;}
  .notif-empty{padding:30px 16px;text-align:center;font-size:12px;color:var(--gray-text);line-height:1.5;}

  /* LAYOUT */
  .layout{flex:1;display:flex;overflow:hidden;position:relative;}

  /* SIDEBAR */
  .sidebar{width:220px;min-width:220px;background:var(--white);border-right:1px solid var(--gray-border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between;}
  .sidebar-head span{font-size:11px;font-weight:600;color:var(--gray-text);text-transform:uppercase;letter-spacing:.06em;}
  .icon-btn-round{width:24px;height:24px;border-radius:50%;border:1px solid var(--gray-border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-text);}
  .icon-btn-round:hover{border-color:var(--purple);color:var(--purple);}
  .client-list{flex:1;overflow-y:auto;padding:6px 0;}
  .client-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-left:2.5px solid transparent;transition:background .1s;}
  .client-item:hover{background:var(--gray-bg);}
  .client-item.active{background:var(--purple-light);border-left-color:var(--purple);}
  .client-av{width:28px;height:28px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--purple);flex-shrink:0;}
  .client-item.active .client-av{background:var(--purple);color:#fff;}
  .client-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .client-item-actions{display:flex;gap:2px;opacity:0;margin-left:auto;flex-shrink:0;}
  .client-item:hover .client-item-actions{opacity:1;}
  .client-item-edit,.client-item-del{background:none;border:none;cursor:pointer;color:var(--gray-text);padding:3px 4px;border-radius:4px;font-size:12px;line-height:1;}
  .client-item-edit:hover{color:var(--purple);background:var(--purple-light);}
  .client-item-del:hover{color:var(--danger);background:var(--danger-bg);}
  .client-wa-tag{font-size:9px;color:var(--success);background:var(--success-bg);padding:1px 5px;border-radius:8px;margin-left:4px;flex-shrink:0;white-space:nowrap;}

  .sidebar-backdrop{display:none;position:fixed;top:var(--header-h);left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:140;}
  .sidebar-backdrop.show{display:block;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  .topbar{padding:10px 16px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;gap:8px;background:var(--white);flex-wrap:wrap;}
  .breadcrumb{display:flex;align-items:center;gap:4px;flex:1;font-size:13px;overflow:hidden;}
  .bc-item{color:var(--gray-text);cursor:pointer;white-space:nowrap;padding:2px 4px;border-radius:4px;}
  .bc-item:hover{color:var(--purple);background:var(--purple-light);}
  .bc-cur{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bc-sep{color:var(--gray-border);font-size:16px;}
  .top-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .btn{padding:6px 12px;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--gray-border);background:var(--white);color:var(--gray-text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);white-space:nowrap;}
  .btn:hover{border-color:var(--purple);color:var(--purple);}
  .btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
  .btn-primary:hover{background:#3C3489;color:#fff;border-color:#3C3489;}
  .btn-danger{color:var(--danger);border-color:var(--danger);}
  .btn-danger:hover{background:var(--danger-bg);}
  .btn-wa{color:var(--success);border-color:var(--success);}
  .btn-wa:hover{background:var(--success-bg);color:var(--success);}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}

  /* FILE AREA */
  .file-area{flex:1;overflow:auto;padding:0;}
  .file-table{width:100%;border-collapse:collapse;min-width:560px;}
  .file-table th{font-size:11px;color:var(--gray-text);font-weight:500;text-transform:uppercase;letter-spacing:.05em;padding:8px 16px;border-bottom:1px solid var(--gray-border);background:var(--gray-bg);text-align:left;position:sticky;top:0;z-index:1;}
  .file-table td{padding:7px 16px;border-bottom:1px solid var(--gray-border);font-size:13px;vertical-align:middle;}
  .file-table tr:last-child td{border-bottom:none;}
  .file-table tr:hover td{background:#F4F4FF;}
  .chk-cell{width:34px;text-align:center;padding-right:0 !important;}
  .chk-cell input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--purple);}
  .file-row-actions{display:flex;gap:3px;opacity:0;}
  .file-table tr:hover .file-row-actions{opacity:1;}
  .ia{width:26px;height:26px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--gray-text);}
  .ia:hover{background:var(--purple-light);color:var(--purple);}
  .ia.del:hover{background:var(--danger-bg);color:var(--danger);}
  .file-icon{display:inline-flex;align-items:center;gap:8px;}
  .fi-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .fi-folder{background:#E8E6FF;color:var(--purple);}
  .fi-pdf{background:#FCEAE7;color:#C0392B;}
  .fi-sheet{background:#E8F5E9;color:#2E7D32;}
  .fi-doc{background:#E3F2FD;color:#1565C0;}
  .fi-img{background:#FFF8E1;color:#F57F17;}
  .fi-default{background:var(--gray-bg);color:var(--gray-text);}
  .name-cell{cursor:pointer;}
  .name-cell:hover .fn-text{text-decoration:underline;color:var(--purple);}
  .rename-input{font-size:13px;border:1.5px solid var(--purple);border-radius:var(--radius-sm);padding:2px 8px;background:var(--white);color:var(--text);font-family:var(--font);outline:none;width:100%;}
  .meta-cell{color:var(--gray-text);}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;color:var(--gray-text);}
  .empty-state svg{opacity:.2;width:48px;height:48px;}
  .empty-state p{font-size:14px;}
  .empty-state small{font-size:12px;opacity:.7;}

  /* STATUS */
  .statusbar{padding:6px 16px;border-top:1px solid var(--gray-border);background:var(--white);font-size:11px;color:var(--gray-text);display:flex;align-items:center;gap:7px;}
  .dot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0;}
  .dot.loading{background:#BA7517;animation:pulse 1s infinite;}
  .dot.error{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px);padding:16px;}
  .modal-overlay.layer2{z-index:260;}
  .modal{background:var(--white);border-radius:14px;border:1px solid var(--gray-border);padding:22px;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:4px;}
  .modal-sub{font-size:13px;color:var(--gray-text);margin-bottom:16px;line-height:1.5;}
  .modal-sub a{color:var(--purple);}
  .form-group{margin-bottom:12px;}
  .form-group label{display:block;font-size:11px;font-weight:500;color:var(--gray-text);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--gray-border);border-radius:var(--radius-sm);background:var(--white);color:var(--text);font-family:var(--font);outline:none;resize:vertical;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--purple);}
  .checkbox-row{display:flex;align-items:flex-start;gap:8px;}
  .checkbox-row input[type=checkbox]{width:auto;flex-shrink:0;margin-top:2px;accent-color:var(--purple);}
  .checkbox-row label{margin:0;text-transform:none;font-size:12px;font-weight:400;color:var(--gray-text);line-height:1.4;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
  .drop-zone{border:2px dashed var(--gray-border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:.15s;}
  .drop-zone:hover,.drop-zone.drag{border-color:var(--purple);background:var(--purple-light);}
  .drop-zone svg{width:28px;height:28px;color:var(--gray-text);margin-bottom:6px;}
  .drop-zone p{font-size:13px;color:var(--gray-text);}
  .drop-zone small{font-size:11px;color:var(--gray-text);opacity:.7;}
  .file-selected{font-size:12px;background:var(--success-bg);color:var(--success);padding:6px 10px;border-radius:var(--radius-sm);margin-top:8px;display:none;}
  .progress-bar{height:4px;background:var(--gray-border);border-radius:2px;overflow:hidden;margin-top:8px;display:none;}
  .progress-fill{height:100%;background:var(--purple);transition:width .3s;}
  .dest-row{display:flex;align-items:center;gap:6px;}
  .dest-path{flex:1;font-size:12px;color:var(--gray-text);background:var(--gray-bg);padding:7px 10px;border-radius:6px;border:1px solid var(--gray-border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .picker-list{max-height:260px;overflow-y:auto;border:1px solid var(--gray-border);border-radius:8px;margin-bottom:6px;}
  .picker-empty{padding:16px;font-size:12px;color:var(--gray-text);text-align:center;}

  /* TOAST */
  .toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300;max-width:90vw;}
  .toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;animation:slideIn .2s ease;max-width:300px;}
  .toast.success{background:#3B6D11;}
  .toast.error{background:var(--danger);}
  @keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* LOADING SPINNER */
  .spinner{width:16px;height:16px;border:2px solid var(--gray-border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}

  svg.icon{width:16px;height:16px;flex-shrink:0;}

  /* RESPONSIVE */
  @media (max-width:768px){
    .menu-toggle{display:flex;}
    .header{padding:0 10px;gap:8px;}
    .header-logo .logo-text{display:none;}
    .user-info span#userName{display:none;}
    .sidebar{
      position:fixed;top:var(--header-h);bottom:0;left:0;
      width:80vw;max-width:300px;
      transform:translateX(-100%);
      transition:transform .25s ease;
      z-index:150;box-shadow:2px 0 18px rgba(0,0,0,.18);
    }
    .sidebar.open{transform:translateX(0);}
    .main{width:100%;}
    .topbar{padding:8px 10px;gap:6px;}
    .breadcrumb{font-size:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .btn{padding:6px 9px;font-size:11px;}
    .auth-card{padding:30px 22px;}
    .notif-panel{right:8px;width:90vw;}
    .modal{padding:16px;width:340px;}
  }
  @media (max-width:420px){
    .header-logo svg{width:16px;height:16px;}
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-card">
    <div style="width:52px;height:52px;background:var(--purple-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" width="28" height="28"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>Gestor de Clientes</h1>
    <p>Conecta tu cuenta de Google para gestionar los documentos de tus clientes directamente desde Drive.</p>
    <button class="auth-btn" onclick="startAuth()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
      Conectar con Google
    </button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="header">
    <button class="menu-toggle" onclick="toggleSidebar(true)" title="Menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="logo-text">Gestor de Clientes</span>
    </div>
    <div class="header-spacer"></div>
    <button class="icon-btn-round notif-btn" id="notifBtn" onclick="toggleNotifPanel()" title="Notificaciones">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
    </button>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div id="notifPanelContainer"></div>
  <div class="layout">
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar(false)"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span>Clientes</span>
        <button class="icon-btn-round" onclick="openAddClient()" title="Agregar cliente">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="client-list" id="clientList">
        <div style="padding:14px;font-size:12px;color:var(--gray-text);">Sin clientes aún.<br>Agrega uno con el botón +</div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div class="breadcrumb" id="breadcrumb">
          <span style="color:var(--gray-text);font-size:13px;">Selecciona un cliente</span>
        </div>
        <div class="top-actions" id="topActions" style="display:none;">
          <button class="btn btn-wa" id="waBtn" style="display:none;" onclick="openWhatsappSend()">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2z"/></svg>
            Enviar (<span class="wa-count">0</span>)
          </button>
          <button class="btn" onclick="openUpload()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            Subir
          </button>
          <button class="btn" onclick="refresh()" title="Actualizar">

const CLIENT_ID = '270114483470-i9360tlt8umur6sssbf4bh48c0leofeb.apps.googleusercontent.com';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = 'https://www.googleapis.com/auth/drive openid profile email';
const DRIVE_API = 'https://www.googleapis.com/drive/v3';
const UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';

// ─── AUTH: PKCE ───────────────────────────────────────────────────────────────
function generateCodeVerifier() {
  const array = new Uint8Array(64);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function startAuth() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'token',
    scope: SCOPES,
    include_granted_scopes: 'true',
    state: 'auth'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function handleAuthCallback() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const error = params.get('error');
  if (error) { showToast('Error de autenticación: ' + error, 'error'); return false; }
  if (token) {
    accessToken = token;
    const expiresIn = parseInt(params.get('expires_in') || '3600');
    localStorage.setItem('drive_token', token);
    localStorage.setItem('drive_token_exp', Date.now() + expiresIn * 1000);
    history.replaceState(null, '', window.location.pathname);
    return true;
  }
  return false;
}

function checkStoredToken() {
  const token = localStorage.getItem('drive_token');
  const exp = parseInt(localStorage.getItem('drive_token_exp') || '0');
  if (token && Date.now() < exp - 60000) { accessToken = token; return true; }
  return false;
}

function logout() {
  localStorage.removeItem('drive_token');
  localStorage.removeItem('drive_token_exp');
  accessToken = null;
  if (notifInterval) { clearInterval(notifInterval); notifInterval = null; }
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

// ─── DRIVE API ────────────────────────────────────────────────────────────────
async function driveRequest(path, options={}) {
  const url = path.startsWith('http') ? path : DRIVE_API + path;
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', ...(options.headers||{}) }
  });
  if (res.status === 401) { logout(); throw new Error('Sesión expirada. Vuelve a conectar.'); }
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error?.message || 'Error ' + res.status); }
  if (res.status === 204) return {};
  return res.json();
}

async function listFiles(folderId) {
  const q = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
  const fields = 'files(id,name,mimeType,size,modifiedTime,webViewLink,webContentLink)';
  const data = await driveRequest(`/files?q=${q}&fields=${encodeURIComponent(fields)}&pageSize=200&orderBy=folder,name`);
  return data.files || [];
}

async function deleteFileDrive(fileId) {
  await driveRequest(`/files/${fileId}`, { method: 'DELETE', headers: {} });
}

async function renameFileDrive(fileId, newName) {
  return driveRequest(`/files/${fileId}`, {
    method: 'PATCH',
    body: JSON.stringify({ name: newName })
  });
}

async function getFileMetadata(fileId) {
  return driveRequest(`/files/${fileId}?fields=id,name,mimeType,webViewLink,webContentLink,exportLinks`);
}

async function ensurePublicLink(fileId) {
  try {
    await driveRequest(`/files/${fileId}/permissions`, {
      method: 'POST',
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });
  } catch(e) { /* puede que la política de la organización no lo permita; se ignora */ }
}

async function getUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  });
  return res.json();
}

async function uploadFile(file, name, parentId, onProgress) {
  const metadata = { name, parents: [parentId] };
  const initRes = await fetch(`${UPLOAD_API}/files?uploadType=resumable`, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
      'X-Upload-Content-Type': file.type || 'application/octet-stream',
      'X-Upload-Content-Length': file.size
    },
    body: JSON.stringify(metadata)
  });
  if (!initRes.ok) throw new Error('Error iniciando subida');
  const uploadUrl = initRes.headers.get('Location');
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', uploadUrl);
    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
    xhr.upload.onprogress = (e) => { if (e.lengthComputable && onProgress) onProgress(e.loaded / e.total); };
    xhr.onload = () => { if (xhr.status < 300) resolve(JSON.parse(xhr.responseText)); else reject(new Error('Error subiendo: ' + xhr.status)); };
    xhr.onerror = () => reject(new Error('Error de red'));
    xhr.send(file);
  });
}

function initials(name) { return (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?'; }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escQ(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function normalizePhone(p) { return (p||'').replace(/[^\d]/g,''); }

function fmtSize(b) {
  if (!b) return '—';
  b = parseInt(b);
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es-PE', {day:'2-digit',month:'short',year:'numeric'});
}
function fmtDateTime(d) {
  try { return new Date(d).toLocaleString('es-PE', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); } catch(e) { return ''; }
}

function getFileIconClass(mimeType, isFolder) {
  if (isFolder) return 'fi-folder';
  if (!mimeType) return 'fi-default';
  if (mimeType.includes('pdf')) return 'fi-pdf';
  if (mimeType.includes('sheet') || mimeType.includes('excel') || mimeType.includes('spreadsheet')) return 'fi-sheet';
  if (mimeType.includes('document') || mimeType.includes('word')) return 'fi-doc';
  if (mimeType.includes('image')) return 'fi-img';
  return 'fi-default';
}
function getFileEmoji(mimeType, isFolder) {
  if (isFolder) return '📁';
  if (!mimeType) return '📄';
  if (mimeType.includes('pdf')) return '📕';
  if (mimeType.includes('sheet') || mimeType.includes('spreadsheet')) return '📗';
  if (mimeType.includes('document')) return '📘';
  if (mimeType.includes('image')) return '🖼';
  if (mimeType.includes('video')) return '🎬';
  if (mimeType.includes('audio')) return '🎵';
  if (mimeType.includes('zip') || mimeType.includes('rar')) return '🗜';
  return '📄';
}

async function openFile(id, name, mimeType) {
  setStatus('Abriendo...', 'loading');
  try {
    const meta = await getFileMetadata(id);
    const url = meta.webContentLink || meta.webViewLink || (meta.exportLinks && Object.values(meta.exportLinks)[0]);
    if (url) { window.open(url, '_blank'); setStatus('Archivo abierto'); }
    else { showToast('No se pudo obtener el link del archivo', 'error'); setStatus('Error', 'error'); }

function startRename(id, currentName) {
  const wrap = document.getElementById('fn-' + id);
  if (!wrap) return;
  wrap.innerHTML = `<input class="rename-input" value="${escH(currentName)}" 
    onblur="commitRename('${escQ(id)}',this.value,'${escQ(currentName)}')" 
    onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='${escQ(currentName)}';this.blur();}" autofocus>`;
  wrap.querySelector('input').select();
}

async function commitRename(id, newName, oldName) {
  newName = newName.trim();
  if (!newName || newName === oldName) { renderFileTable(); return; }
  setStatus('Renombrando...', 'loading');
  try {
    await renameFileDrive(id, newName);
    const f = currentFiles.find(x => x.id === id);
    if (f) f.name = newName;
    showToast(`Renombrado a "${newName}"`, 'success');
    setStatus('Renombrado');
    renderFileTable();
  } catch(e) { showToast('Error al renombrar: ' + e.message, 'error'); setStatus('Error', 'error'); renderFileTable(); }
}

function confirmDelete(id, name) {
  openModal(`
    <h3>Eliminar archivo</h3>
    <p class="modal-sub">"<strong>${escH(name)}</strong>" se moverá a la papelera de Google Drive.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete('${escQ(id)}','${escQ(name)}')">Eliminar</button>
    </div>`);
}

async function doDelete(id, name) {
  closeModal();
  setStatus('Eliminando...', 'loading');
  try {
    await deleteFileDrive(id);
    currentFiles = currentFiles.filter(x => x.id !== id);
    selectedIds.delete(id);
    showToast(`"${name}" eliminado`, 'success');
    setStatus(`Eliminado`);
    renderFileTable();
  } catch(e) { showToast('Error: ' + e.message, 'error'); setStatus('Error', 'error'); }
}

// ─── UPLOAD ───────────────────────────────────────────────────────────────────
let pendingFile = null;

function openUpload() {
  if (!clients.length) { showToast('Agrega un cliente primero', 'error'); return; }
  const clientOpts = clients.map((c,i) => `<option value="${i}" ${i===activeIdx?'selected':''}>${escH(c.name)}</option>`).join('');
  const ci = activeIdx !== null ? activeIdx : 0;
  if (activeIdx !== null && folderStack.length) {
    const cur = folderStack[folderStack.length-1];
    uploadDestFolder = { id: cur.id, name: cur.name, path: folderStack.map(f=>f.name).join(' / ') };
  } else {
    uploadDestFolder = { id: clients[ci].folderId, name: clients[ci].name, path: clients[ci].name };
  }
  openModal(`
    <h3>Subir archivo</h3>
    <div class="form-group">
      <label>Cliente destino</label>
      <select id="uClient" onchange="onUploadClientChange()">${clientOpts}</select>
    </div>
    <div class="form-group">
      <label>Carpeta destino en Drive</label>
      <div class="dest-row">
        <div class="dest-path" id="uDestPath">${escH(uploadDestFolder.path||'')}</div>
        <button type="button" class="btn" onclick="openFolderPicker()">Cambiar</button>
      </div>
    </div>
    <div class="form-group">
      <label>Nombre en Drive (opcional)</label>
      <input type="text" id="uName" placeholder="Se usará el nombre original si se deja vacío">
    </div>
    <div class="form-group">
      <label>Archivo</label>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('uFile').click()" 
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <p>Arrastra un archivo aquí o haz clic</p>
        <small>Cualquier formato</small>
        <input type="file" id="uFile" style="display:none" onchange="onFileChosen(this.files[0])">
      </div>
      <div class="file-selected" id="fileSelected"></div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="uploadBtn" onclick="doUpload()">Subir</button>
    </div>`);
  pendingFile = null;
}

function onUploadClientChange() {
  const ci = parseInt(document.getElementById('uClient').value);
  uploadDestFolder = { id: clients[ci].folderId, name: clients[ci].name, path: clients[ci].name };
  document.getElementById('uDestPath').textContent = uploadDestFolder.path;
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) onFileChosen(f);
}

function onFileChosen(file) {
  pendingFile = file;
  const el = document.getElementById('fileSelected');
  el.style.display = 'block';
  el.textContent = `✓ ${file.name} (${fmtSize(file.size)})`;
  if (!document.getElementById('uName').value) document.getElementById('uName').value = file.name;
}

async function doUpload() {
  if (!pendingFile) { showToast('Selecciona un archivo primero', 'error'); return; }
  const ci = parseInt(document.getElementById('uClient').value);
  const name = document.getElementById('uName').value.trim() || pendingFile.name;
  const parentId = (uploadDestFolder && uploadDestFolder.id) || clients[ci].folderId;

  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('uploadBtn').textContent = 'Subiendo...';
  document.getElementById('progressBar').style.display = 'block';

  try {
    await uploadFile(pendingFile, name, parentId, (pct) => {
      document.getElementById('progressFill').style.width = Math.round(pct*100) + '%';
    });
    showToast(`"${name}" subido correctamente`, 'success');
    closeModal();
    const curFolder = folderStack[folderStack.length-1];
    if (ci === activeIdx && curFolder && curFolder.id === parentId) refresh();
  } catch(e) {
    showToast('Error al subir: ' + e.message, 'error');
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('uploadBtn').textContent = 'Subir';
  }
}

// ─── SELECTOR DE CARPETA DESTINO (PICKER) ──────────────────────────────────────
function openFolderPicker() {
  const ci = parseInt(document.getElementById('uClient').value);
  pickerStack = [{ id: clients[ci].folderId, name: clients[ci].name }];
  renderFolderPicker();
}

async function renderFolderPicker() {
  const cur = pickerStack[pickerStack.length-1];
  openModal2(`
    <h3>Elegir carpeta destino</h3>
    <p class="modal-sub">${pickerStack.map(f=>escH(f.name)).join(' / ')}</p>
    <div class="picker-list" id="pickerList">
      <div style="padding:24px;text-align:center;"><div class="spinner"></div></div>
    </div>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn" ${pickerStack.length<=1?'disabled':''} onclick="pickerGoUp()">⬅ Subir nivel</button>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="closeModal2()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmFolderPicker()">Usar esta carpeta</button>
      </div>
    </div>`);
  try {
    const files = await listFiles(cur.id);
    const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
    const list = document.getElementById('pickerList');
    if (!list) return;
    if (!folders.length) { list.innerHTML = '<div class="picker-empty">Sin subcarpetas aquí. Puedes usar esta carpeta directamente.</div>'; return; }
    list.innerHTML = folders.map(f => `<div class="client-item" style="border-left:none;" onclick="pickerEnter('${escQ(f.id)}','${escQ(f.name)}')">
      <div class="fi-dot fi-folder" style="width:24px;height:24px;font-size:12px;">📁</div>
      <span class="client-name">${escH(f.name)}</span>
    </div>`).join('');
  } catch(e) {
    const list = document.getElementById('pickerList');
    if (list) list.innerHTML = `<div class="picker-empty" style="color:var(--danger);">Error: ${escH(e.message)}</div>`;
  }
}

function pickerEnter(id, name) { pickerStack.push({id,name}); renderFolderPicker(); }
function pickerGoUp() { if (pickerStack.length>1) { pickerStack.pop(); renderFolderPicker(); } }

function confirmFolderPicker() {
  const cur = pickerStack[pickerStack.length-1];
  uploadDestFolder = { id: cur.id, name: cur.name, path: pickerStack.map(f=>f.name).join(' / ') };
  const pathEl = document.getElementById('uDestPath');
  if (pathEl) pathEl.textContent = uploadDestFolder.path;
  closeModal2();
}

// ─── ENVÍO POR WHATSAPP ─────────────────────────────────────────────────────────
function openWhatsappSend() {
  const client = clients[activeIdx];
  if (!client) return;
  if (!selectedIds.size) { showToast('Selecciona al menos un archivo', 'error'); return; }
  const items = currentFiles.filter(f => selectedIds.has(f.id));
  const hasPhone = !!client.whatsapp;
  const lines = [`Hola! Te comparto ${items.length>1?'estos archivos':'este archivo'}:`,
    ...items.map(it => `• ${it.name}: ${it.webViewLink||''}`)];
  openModal(`
    <h3>Enviar por WhatsApp</h3>
    <p class="modal-sub">${hasPhone
      ? `Se enviará a <strong>${escH(client.whatsapp)}</strong> (${escH(client.name)})`
      : `Este cliente no tiene un WhatsApp configurado. <a href="#" onclick="closeModal();openEditClient(null,${activeIdx});return false;">Configúralo aquí</a>`}</p>
    <div class="form-group">
      <label>Mensaje</label>
      <textarea id="waMsg" rows="6">${escH(lines.join('\n'))}</textarea>
    </div>
    <div class="form-group checkbox-row">
      <input type="checkbox" id="waShare" checked>
      <label for="waShare">Permitir acceso por enlace a estos archivos antes de enviar (recomendado, para que el cliente pueda abrirlos)</label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="waSendBtn" ${!hasPhone?'disabled':''} onclick="confirmSendWhatsapp(${activeIdx})">Abrir WhatsApp</button>
    </div>`);
}

async function confirmSendWhatsapp(ci) {
  const client = clients[ci];
  const phone = normalizePhone(client.whatsapp);
  if (!phone) { showToast('Número de WhatsApp inválido', 'error'); return; }
  const msg = document.getElementById('waMsg').value;
  const share = document.getElementById('waShare').checked;
  const btn = document.getElementById('waSendBtn');
  btn.disabled = true; btn.textContent = 'Preparando...';
  try {
    if (share) {
      const items = currentFiles.filter(f => selectedIds.has(f.id));
      for (const it of items) { await ensurePublicLink(it.id); }
    }
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    closeModal();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Abrir WhatsApp';
  }
}

// ─── NOTIFICACIONES (cambios externos en Drive) ───────────────────────────────
function toggleNotifPanel() {
  const panel = document.getElementById('notifPanelContainer');
  if (panel.innerHTML) { panel.innerHTML = ''; return; }
  renderNotifPanel();
}

function renderNotifPanel() {
  const panel = document.getElementById('notifPanelContainer');
  if (!notifications.length) {
    panel.innerHTML = `<div class="notif-panel">
      <div class="notif-panel-head"><h4>Notificaciones</h4>
        <button class="notif-link" onclick="manualCheckChanges()">Verificar ahora</button>
      </div>
      <div class="notif-empty">Sin notificaciones.<br>Aquí verás avisos si algún archivo de un cliente cambia, se agrega o se elimina fuera de la app.</div>
    </div>`;
    return;
  }
  const items = notifications.map(n => `
    <div class="notif-item ${n.read?'read':'unread'}" onclick="markNotifRead('${n.id}')">
      <div class="notif-dot2"></div>
      <div class="notif-txt">
        <div>${notifTypeLabel(n.type)} en <b>${escH(n.clientName)}</b>: ${escH(n.fileName)}</div>
        <div class="notif-meta">${fmtDateTime(n.time)}</div>
      </div>
    </div>`).join('');
  panel.innerHTML = `<div class="notif-panel">
    <div class="notif-panel-head">
      <h4>Notificaciones</h4>
      <div class="notif-panel-actions">
        <button class="notif-link" onclick="manualCheckChanges()">Verificar</button>
        <button class="notif-link" onclick="markAllRead()">Marcar leídas</button>
        <button class="notif-link" onclick="clearNotifs()">Limpiar</button>
      </div>
    </div>
    <div>${items}</div>
  </div>`;
}

function notifTypeLabel(t) { return t==='new' ? '🆕 Archivo nuevo' : t==='modified' ? '✏️ Modificado' : '🗑 Eliminado'; }

function markNotifRead(id) {
  const n = notifications.find(x => x.id === id);
  if (n) { n.read = true; saveNotifications(); renderNotifBadge(); renderNotifPanel(); }
}
function markAllRead() { notifications.forEach(n => n.read = true); saveNotifications(); renderNotifBadge(); renderNotifPanel(); }
function clearNotifs() { notifications = []; saveNotifications(); renderNotifBadge(); renderNotifPanel(); }

function renderNotifBadge() {
  const count = notifications.filter(n => !n.read).length;
  const el = document.getElementById('notifBadge');
  if (!el) return;
  el.style.display = count ? 'flex' : 'none';
  el.textContent = count > 9 ? '9+' : count;
}

async function manualCheckChanges() {
  showToast('Verificando cambios en Drive...', '');
  const n = await checkForChanges(false);
  renderNotifPanel();
  showToast(n > 0 ? `${n} cambio(s) detectado(s)` : 'Sin cambios nuevos', n > 0 ? 'success' : '');
}

// Revisa la carpeta raíz de cada cliente y compara contra el último snapshot guardado.
// La primera vez que se revisa un cliente solo se guarda la línea base (sin generar avisos).
async function checkForChanges(silent=true) {
  if (!accessToken || !clients.length) return 0;
  if (!silent) setStatus('Verificando cambios...', 'loading');
  let count = 0;
  for (let i = 0; i < clients.length; i++) {
    const c = clients[i];
    try {
      const files = await listFiles(c.folderId);
      const prev = snapshots[c.folderId];
      const curMap = {};
      files.forEach(f => { curMap[f.id] = f.modifiedTime; });
      if (prev) {
        files.forEach(f => {
          if (!prev[f.id]) {
            notifications.unshift({ id: genId(), clientName: c.name, fileName: f.name, type: 'new', time: f.modifiedTime, read: false });
            count++;
          } else if (prev[f.id] !== f.modifiedTime) {
            notifications.unshift({ id: genId(), clientName: c.name, fileName: f.name, type: 'modified', time: f.modifiedTime, read: false });
            count++;
          }
        });
        Object.keys(prev).forEach(fid => {
          if (!curMap[fid]) {
            notifications.unshift({ id: genId(), clientName: c.name, fileName: '(archivo eliminado o movido)', type: 'deleted', time: new Date().toISOString(), read: false });
            count++;
          }
        });
      }
      snapshots[c.folderId] = curMap;
    } catch(e) { /* cliente sin acceso o carpeta inválida: se omite */ }
  }
  if (notifications.length > 60) notifications = notifications.slice(0, 60);
  saveSnapshots();
  saveNotifications();
  renderNotifBadge();
  if (!silent) setStatus('Listo');
  return count;
}

// Cierra el panel de notificaciones al hacer clic fuera de él
document.addEventListener('click', (e) => {
  const panel = document.getElementById('notifPanelContainer');
  const btn = document.getElementById('notifBtn');
  if (panel && panel.innerHTML && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    panel.innerHTML = '';
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  loadClientsFromStorage();
  loadSnapshots();
  loadNotifications();

  let authed = false;
  if (window.location.hash.includes('access_token')) {
    authed = handleAuthCallback();
  } else {
    authed = checkStoredToken();
  }

  if (authed) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    renderClients();
    renderNotifBadge();
    try {
      const info = await getUserInfo();
      document.getElementById('userName').textContent = info.name || info.email || '';
      document.getElementById('userAvatar').textContent = initials(info.name || info.email || '?');
    } catch(e) {}
    checkForChanges(true);
    notifInterval = setInterval(() => checkForChanges(true), 5 * 60 * 1000);
  } else {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
}

init();
</script>
